<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - OM INFO SOLUTIONS</title>

</head>

<body>

<div class="header">
    <h1>OM INFO SOLUTIONS</h1>
</div>

<div class="menu">
    <a href="sixty_two.html">Home</a>
    <a href="Home.html">Courses</a>
    <a href="insert.html">Insert</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
</div>

<div class="contact-container">

    <h2>Contact Us</h2>

    <div class="contact-info">
        <p><strong>Address:</strong> New Delhi, India</p>
        <p><strong>Phone:</strong> +91 9911216943</p>
        <p><strong>Email:</strong> info@ominfosolutions.com</p>
        <p><strong>Hours:</strong> 7:00 AM – 7:00 PM</p>
    </div>

    <div class="contact-form">
        <form id="contactForm">
            
            <label>Name:</label>
            <input type="text" id="name" placeholder="Your Name" required>

            <label>Email:</label>
            <input type="email" id="email" placeholder="Your Email" required>

            <label>Message:</label>
            <textarea id="message" rows="5" placeholder="Your Message" required></textarea>

            <input type="submit" value="Send Message">
        </form>

        <p id="successMsg"></p>
    </div>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let email = document.getElementById("email").value;
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!email.match(emailPattern)) {
        alert("Please enter a valid email!");
        return;
    }

    document.getElementById("successMsg").innerText = "✅ Your message has been submitted to our email!";
});
</script>

</body>
</html>
