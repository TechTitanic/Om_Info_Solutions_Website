<!DOCTYPE html>
<html>
<head>
    <title>Our Gallery - OM INFO SOLUTIONS</title>
    <link rel="stylesheet" href="gallery.css">

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .header {
            background: blue;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .menu {
            text-align: center;
            padding: 10px;
        }

        .menu a {
            margin: 10px;
            text-decoration: none;
        }

        .gallery {
            text-align: center;
            margin-top: 20px;
        }

        .slideshow {
            position: relative;
            width: 500px;
            height: 320px;
            margin: auto;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: none;
        }

        .slide.active {
            display: block;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: black;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .prev { left: 0; }
        .next { right: 0; }
    </style>
</head>

<body>

<div class="header">
    <h1>OM INFO SOLUTIONS</h1>
</div>

<div class="menu">
    <a href="index.html">Home</a>
    <a href="course.html">Courses</a>
    <a href="insert.html">Insert</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
</div>

<div class="gallery">
    <h2>Our Gallery</h2>

    <div class="slideshow">

      
        <img class="slide active" src="./Image/b16.jpg">
        <img class="slide" src="./Image/b17.jpeg">
        <img class="slide" src="./Image/b18.webp">
        <img class="slide" src="./Image/b11.jpg">
        <img class="slide" src="./Image/b30.avif">
        <img class="slide" src="./Image/b33.jpg">

        <button class="prev" onclick="changeSlide(-1)">❮</button>
        <button class="next" onclick="changeSlide(1)">❯</button>
    </div>
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function changeSlide(step) {
    index += step;

    if (index >= slides.length) index = 0;
    if (index < 0) index = slides.length - 1;

    showSlide(index);
}

window.onload = function () {
    showSlide(index);
};

setInterval(() => {
    changeSlide(1);
}, 3000);
</script>

</body>
</html>
