<!DOCTYPE html>
<html>
<head>
    <title>Our Gallery - OM INFO SOLUTIONS</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .menu {
            background: #555;
            text-align: center;
            padding: 10px;
        }

        .menu a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .gallery {
            text-align: center;
            padding: 20px;
        }

        .slideshow {
            position: relative;
            width: 600px;
            height: 350px;
            margin: auto;
            overflow: hidden;
            border: 2px solid #ccc;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: none;
        }

        .slide.active {
            display: block;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: black;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }

        .prev { left: 0; }
        .next { right: 0; }

        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>OM INFO SOLUTIONS</h1>
</div>

<div class="menu">
    <a href="#">Home</a>
    <a href="#">Courses</a>
    <a href="#">Insert</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="#">Gallery</a>
</div>

<div class="gallery">
    <h2>Our Gallery</h2>

    <div class="slideshow">
        <img class="slide active" src="Image/b16.jpg">
        <img class="slide" src="Image/b17.jpeg">
        <img class="slide" src="Image/b18.webp">
        <img class="slide" src="Image/b11.jpg">
        <img class="slide" src="Image/b30.avif">
        <img class="slide" src="Image/b33.jpg">

        <button class="prev" onclick="changeSlide(-1)">❮</button>
        <button class="next" onclick="changeSlide(1)">❯</button>
    </div>
</div>

<div class="footer">
    <p>© 2026 OM INFO SOLUTIONS</p>
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
    slides.forEach(slide => slide.classList.remove("active"));
    slides[i].classList.add("active");
}

function changeSlide(step) {
    index += step;

    if (index >= slides.length) index = 0;
    if (index < 0) index = slides.length - 1;

    showSlide(index);
}

// initial
showSlide(index);

// auto slideshow
setInterval(() => {
    changeSlide(1);
}, 3000);
</script>

</body>
</html>
